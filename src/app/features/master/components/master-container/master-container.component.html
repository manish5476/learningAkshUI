<div class="grid">
  <div class="col-12 md:col-4 lg:col-3">
    <p-card header="Master Data">
      
      <p-select 
        [options]="masterCategories" 
        [ngModel]="selectedMasterCategory()" 
        (ngModelChange)="selectedMasterCategory.set($event)" 
        placeholder="Filter by Category" 
        styleClass="w-full mb-3" 
        [showClear]="true">
      </p-select>

      <button pButton label="New Master" icon="pi pi-plus" class="p-button-outlined w-full mb-3" (click)="openNewMasterDialog()"></button>

      <div class="flex flex-column gap-2" *ngIf="!loading()">
        <div *ngFor="let master of filteredMasters()" 
             class="p-3 border-round cursor-pointer transition-colors transition-duration-200 flex justify-content-between align-items-center"
             [ngClass]="{
               'bg-primary-50 text-primary-900 border-primary border-1': selectedMasterId() === master._id, 
               'surface-border border-1 hover:surface-hover': selectedMasterId() !== master._id
             }"
             (click)="selectMaster(master)">
          
          <div class="overflow-hidden text-overflow-ellipsis white-space-nowrap">
            <span class="font-medium">{{ master.displayName }}</span>
            <br>
            <small class="text-500">{{ master.masterName }}</small>
          </div>

          <div class="flex gap-1" *ngIf="selectedMasterId() === master._id">
             <button pButton pRipple icon="pi pi-pencil" class="p-button-rounded p-button-text p-button-sm" (click)="editMaster(master); $event.stopPropagation()" pTooltip="Edit Master"></button>
             <button pButton pRipple icon="pi pi-trash" class="p-button-rounded p-button-text p-button-danger p-button-sm" (click)="deleteMaster(master); $event.stopPropagation()" pTooltip="Delete Master" [disabled]="master.isSystem"></button>
          </div>
        </div>

        <div *ngIf="filteredMasters().length === 0" class="text-500 text-sm text-center p-3">
          No masters found in this category.
        </div>
      </div>
      
      <div *ngIf="loading()" class="flex justify-content-center p-4">
        <i class="pi pi-spin pi-spinner" style="font-size: 2rem"></i>
      </div>
    </p-card>
  </div>

  <div class="col-12 md:col-8 lg:col-9">
    <p-card [header]="selectedMasterDetails()?.displayName || 'Select a Master to view details'">
      
      <p-toolbar styleClass="mb-4" *ngIf="selectedMasterDetails()">
        <ng-template pTemplate="left">
          <button pButton label="Add Value" icon="pi pi-plus" class="p-button-success" (click)="openNewValueDialog()"></button>
        </ng-template>
        <ng-template pTemplate="right">
          <p-select 
            [options]="[{label: 'All Statuses', value: ''}, {label: 'Published', value: 'published'}, {label: 'Draft', value: 'draft'}]" 
            [ngModel]="valueFilterStatus()"
            (ngModelChange)="valueFilterStatus.set($event)"
            placeholder="Filter Status">
          </p-select>
        </ng-template>
      </p-toolbar>

      <app-master-value-grid 
        *ngIf="selectedMasterDetails()"
        [values]="filteredValues()"
        [loading]="loading()"
        (onEdit)="handleEditValue($event)"
        (onDelete)="handleDeleteValue($event)">
      </app-master-value-grid>

      <div *ngIf="!selectedMasterDetails()" class="flex flex-column align-items-center justify-content-center p-5 text-500">
        <i class="pi pi-list text-6xl mb-3 border-circle surface-200 p-4"></i>
        <h3>No Master Selected</h3>
        <p>Choose a master list from the sidebar to view and manage its values.</p>
      </div>
    </p-card>
  </div>
</div>

<app-master-value-dialog
  [visible]="showValueDialog()"
  (visibleChange)="showValueDialog.set($event)"
  [editingValue]="editingValue()"
  (save)="handleSaveValue($event)">
</app-master-value-dialog>

<p-dialog [header]="editingMaster() ? 'Edit Master Details' : 'Create New Master'" 
          [visible]="showMasterDialog()" 
          (visibleChange)="showMasterDialog.set($event)" 
          [modal]="true" 
          [style]="{ width: '450px' }">
          
  <form [formGroup]="masterForm" (ngSubmit)="saveMaster()" class="p-fluid mt-3">
    <div class="field mb-4">
      <label for="displayName">Display Name *</label>
      <input pInputText id="displayName" formControlName="displayName" placeholder="e.g., Course Categories" autofocus />
    </div>

    <div class="field mb-4">
      <label for="masterName">System Code *</label>
      <input pInputText id="masterName" formControlName="masterName" placeholder="e.g., COURSE_CATEGORY" [readOnly]="!!editingMaster()" />
      <small class="text-gray-500">Uppercase letters and underscores only. Cannot be changed later.</small>
    </div>

    <div class="field mb-4">
      <label for="category">Category</label>
      <p-select id="category" [options]="masterCategories" formControlName="category" appendTo="body"></p-select>
    </div>

    <div class="field mb-4">
      <label for="description">Description</label>
      <textarea pInputTextarea id="description" formControlName="description" rows="3"></textarea>
    </div>

    <div class="flex flex-column gap-3 mt-4 mb-4 border-top-1 surface-border pt-4">
      <div class="flex align-items-center justify-content-between">
        <label for="isHierarchical" class="mb-0">Is Hierarchical (Parent/Child)</label>
        <p-toggleswitch formControlName="isHierarchical" inputId="isHierarchical"></p-toggleswitch>
      </div>
      <div class="flex align-items-center justify-content-between">
        <label for="hasMetadata" class="mb-0">Supports Metadata (Icons/Colors)</label>
        <p-toggleswitch formControlName="hasMetadata" inputId="hasMetadata"></p-toggleswitch>
      </div>
    </div>

    <div class="flex justify-content-end gap-2 mt-4">
      <button pButton type="button" label="Cancel" icon="pi pi-times" class="p-button-text" (click)="showMasterDialog.set(false)"></button>
      <button pButton type="submit" label="Save" icon="pi pi-check" [disabled]="masterForm.invalid"></button>
    </div>
  </form>
</p-dialog>

<p-confirmDialog></p-confirmDialog>
<p-toast></p-toast>
