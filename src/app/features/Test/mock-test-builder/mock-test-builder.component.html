<p-toast position="top-right"></p-toast>

<div class="mock-test-container">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
    
    <div class="header-section">
      <div class="header-content">
        <h1 class="page-title">Mock Test Builder</h1>
        <p class="page-subtitle">Design highly accurate, timed assessments</p>
      </div>
      <div class="header-actions">
        <button class="btn-ghost" routerLink="/instructor/mock-tests">Cancel</button>
        <button 
          class="btn-primary"
          (click)="saveMockTest()" 
          [disabled]="isSaving()">
          <i [ngClass]="isSaving() ? 'pi pi-spinner pi-spin' : 'pi pi-check-circle'"></i>
          {{ isSaving() ? 'Publishing...' : 'Save & Publish' }}
        </button>
      </div>
    </div>

    <form [formGroup]="testForm" class="builder-grid">
      
      <aside class="settings-sidebar">
        <div class="card card-sticky">
          <h3 class="section-header">
            <i class="pi pi-sliders-h"></i> Exam Settings
          </h3>
          
          <div class="form-stack">
            <div class="form-group">
              <label class="input-label">Exam Title</label>
              <input pInputText formControlName="title" placeholder="e.g. SSC CGL Tier 1" 
                     class="w-full" [class.p-invalid]="testForm.get('title')?.invalid && testForm.get('title')?.touched">
            </div>
            
            <div class="grid grid-cols-2 gap-3">
              <div class="form-group">
                <label class="input-label">Duration (Min)</label>
                <p-inputNumber formControlName="duration" styleClass="w-full"></p-inputNumber>
              </div>
              <div class="form-group">
                <label class="input-label">Pass Marks</label>
                <p-inputNumber formControlName="passingMarks" styleClass="w-full"></p-inputNumber>
              </div>
            </div>

            <div class="form-group">
              <label class="input-label">Difficulty Level</label>
              <p-select formControlName="level" [options]="levels" optionLabel="label" optionValue="value" styleClass="w-full" appendTo="body"></p-select>
            </div>

            <div class="free-toggle-box">
              <div class="flex items-center gap-2">
                <p-checkbox formControlName="isFree" [binary]="true" inputId="freeCheck"></p-checkbox>
                <label for="freeCheck" class="toggle-label">Make this test Free</label>
              </div>
              
              @if (!testForm.get('isFree')?.value) {
                <div class="price-input-container">
                  <label class="input-label-xs">Price ($)</label>
                  <p-inputNumber formControlName="price" mode="currency" currency="USD" styleClass="w-full"></p-inputNumber>
                </div>
              }
            </div>
          </div>
        </div>
      </aside>

      <main class="questions-main" formArrayName="questions">
        @for (q of questions.controls; track $index; let i = $index) {
          <div class="question-card" [formGroupName]="i">
            
            <div class="question-badge">Q{{ i + 1 }}</div>

            <div class="question-header">
              <div class="flex-1 min-w-[180px]">
                <label class="input-label-xs">Section Name</label>
                <input pInputText formControlName="sectionName" class="w-full p-inputtext-sm">
              </div>
              <div class="w-24">
                <label class="input-label-xs text-success">+ Correct</label>
                <p-inputNumber formControlName="marks" styleClass="w-full"></p-inputNumber>
              </div>
              <div class="w-24">
                <label class="input-label-xs text-error">- Penalty</label>
                <p-inputNumber formControlName="negativeMarks" [minFractionDigits]="2" styleClass="w-full"></p-inputNumber>
              </div>
              <button class="btn-delete" (click)="removeQuestion(i)">
                <i class="pi pi-trash"></i>
              </button>
            </div>

            <div class="question-body">
              <div class="form-group">
                <label class="input-label">Question Text</label>
                <textarea pTextarea formControlName="question" rows="2" class="w-full question-textarea"></textarea>
              </div>

              <div class="options-container" formArrayName="options">
                <div class="options-header">
                  <label class="input-label">Answer Options</label>
                  <span class="helper-text">Select the correct answer</span>
                </div>
                
                <div class="options-stack">
                  @for (opt of getOptions(i).controls; track $index; let j = $index) {
                    <div class="option-row" [formGroupName]="j" [class.is-correct]="opt.get('isCorrect')?.value">
                      <div class="option-check">
                        <p-checkbox formControlName="isCorrect" [binary]="true" (onChange)="onCorrectChange(i, j, $event.checked)"></p-checkbox>
                      </div>
                      <input pInputText formControlName="text" [placeholder]="'Option ' + (j + 1)" class="flex-1 p-inputtext-sm">
                      <button class="btn-option-remove" (click)="removeOption(i, j)" [disabled]="getOptions(i).length <= 2">
                        <i class="pi pi-times text-xs"></i>
                      </button>
                    </div>
                  }
                </div>
                
                <button class="btn-add-option" (click)="addOption(i)">
                  <i class="pi pi-plus"></i> Add Option
                </button>
              </div>
            </div>
          </div>
        }

        <button class="add-question-placeholder" (click)="addQuestion()">
          <div class="plus-icon"><i class="pi pi-plus"></i></div>
          <span>Add New Question</span>
        </button>
      </main>

    </form>
  </div>
</div>
